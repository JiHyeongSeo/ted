name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goarch: amd64
            artifact: ted_linux_amd64
          - os: ubuntu-24.04-arm
            goarch: arm64
            artifact: ted_linux_arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          CGO_ENABLED: 1
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -ldflags "-s -w" -o ted ./cmd/ted
          tar czf ${{ matrix.artifact }}.tar.gz ted

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "ted ${{ github.ref_name }}" \
            --generate-notes \
            artifacts/*.tar.gz
